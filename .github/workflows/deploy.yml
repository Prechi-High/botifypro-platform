name: Deploy Bot Engine

on:
  push:
    branches: [main]
    paths:
      - 'apps/bot-engine/**'
      - 'apps/bot-engine/package.json'
      - 'packages/database/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_KEY }}
          script: |
            cd /var/www/botifypro
            git pull origin main
            cd packages/database
            sed -i 's|"main": "./index.ts"|"main": "./dist/index.js"|' package.json
            sed -i 's|"name": "@1-touchbot/database"|"name": "@botifypro/database"|' package.json
            npx prisma db push
            npx prisma generate
            npx tsc
            cd /var/www/botifypro
            npm install
            cd /var/www/botifypro/apps/bot-engine
            npm run build
            pm2 restart botifypro-engine --update-env
            echo "Deploy complete"
